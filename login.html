<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Login - Baao Coop</title>
    <link rel="icon" href="assets/logo.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #e3f2fd; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card {
            background: white; padding: 40px; width: 100%; max-width: 400px;
            border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center; border-top: 5px solid var(--primary);
        }
        .login-card img { height: 80px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .login-input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; }
        .btn-login { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .btn-login:hover { background: #001540; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="assets/logo.png" alt="Logo">
        <h2 style="color: var(--primary); margin-bottom: 20px;">Member Access</h2>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Email or Member ID</label>
                <input type="text" id="emailInput" class="login-input" placeholder="Enter Email or ID" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="passwordInput" class="login-input" placeholder="Enter Password" required>
            </div>
            <button type="submit" class="btn-login">LOG IN</button>
        </form>

        <p style="margin-top: 20px; font-size: 0.9rem;">
            Not a member yet? <a href="signup.html" style="color: var(--secondary); font-weight: bold;">Sign Up Now</a>
        </p>
        <p style="margin-top: 10px; font-size: 0.8rem; color: #666;">
            <a href="index.html">&larr; Back to Website</a>
        </p>
    </div>
    <!-- LINK TO THE EXTERNAL SCRIPT ONLY -->
    <script src="script.js"></script>
</body>
</html>
