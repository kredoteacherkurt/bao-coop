<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Portal | Baao Coop V2.0</title>
    <link rel="stylesheet" href="css/styles.css">
    <!-- FontAwesome for icons used by coop-logic.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: var(--bg-color);
        }

        .dashboard-header {
            background: var(--nav-bg);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .dashboard-container {
            max-width: var(--max-width);
            margin: 2rem auto;
            padding: 0 2rem;
            display: grid;
            gap: 2rem;
        }

        .stat-card {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            border-left: 4px solid var(--primary);
        }

        .stat-card.secondary {
            border-left-color: var(--secondary);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }

        .panel {
            padding: 2rem;
        }

        .form-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .form-row > * {
            flex: 1;
        }
        
        select, input[type="file"] {
            width: 100%;
            padding: 1rem 1.5rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--text-muted);
            background: var(--bg-alt);
            color: var(--text-main);
            font-family: var(--font-family);
            font-size: 1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        th {
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .status-badge {
            padding: 0.3rem 0.8rem;
            border-radius: var(--radius-full);
            font-size: 0.8rem;
            font-weight: 600;
        }

        .pending { background: #fef08a; color: #854d0e; }
        .approved { background: #bbf7d0; color: #166534; }
        .rejected { background: #fecdd3; color: #9f1239; }

        @media (max-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            .form-row {
                flex-direction: column;
            }
        }
        
        /* Custom Modal Styles (From logic file dependency) */
        .custom-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
            backdrop-filter: blur(5px);
        }
        .custom-modal-overlay.active { opacity: 1; pointer-events: auto; }
        .custom-modal-box {
            background: var(--bg-alt); padding: 25px; border-radius: var(--radius-md); width: 90%; max-width: 400px;
            box-shadow: var(--shadow-lg); text-align: center; transform: translateY(-20px); transition: transform 0.3s;
        }
        .custom-modal-overlay.active .custom-modal-box { transform: translateY(0); }
        .custom-modal-actions { display: flex; justify-content: center; gap: 10px; margin-top:1rem; }
        .custom-modal-btn { padding: 10px 20px; border: none; border-radius: var(--radius-sm); cursor: pointer; font-weight: bold; }
        .custom-modal-btn-primary { background: var(--primary); color: white; }
        .custom-modal-btn-cancel { background: #ccc; color: #333; }
        .custom-modal-box.wide { max-width: 600px; text-align: left; max-height: 80vh; overflow-y: auto; }
    </style>
    <link rel="icon" href="assets/images/logo.png" type="image/png">
</head>
<body id="member-page">

    <header class="dashboard-header">
        <a href="index.html" class="logo" style="text-decoration: none; color: inherit;">
            <img src="assets/images/logo.png" alt="Baao Coop Logo" style="height:40px;width:40px;border-radius:var(--radius-sm);object-fit:cover;">
            <span>Baao Coop</span>
        </a>
        <div style="display: flex; align-items: center; gap: 1.5rem;">
            <span style="font-weight: 500;">Welcome, <span id="display-name" class="title-gradient">Member</span></span>
            <button onclick="logout()" class="btn btn-secondary" style="padding: 0.5rem 1rem;"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </header>

    <div class="dashboard-container">
        
        <!-- Stats -->
        <div class="grid-cards" style="grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));">
            <div class="stat-card glass fade-up visible">
                <h3 style="display: flex; align-items: center; gap: 0.5rem; font-size: 1.1rem; color: var(--text-muted);">
                    <i class="fas fa-wallet"></i> Total Savings
                </h3>
                <div class="stat-value" id="savings-display">₱ 0.00</div>
            </div>
            <div class="stat-card secondary glass fade-up visible">
                <h3 style="display: flex; align-items: center; gap: 0.5rem; font-size: 1.1rem; color: var(--text-muted);">
                    <i class="fas fa-hand-holding-usd"></i> Active Loans
                </h3>
                <div class="stat-value" id="loan-display" style="color: var(--secondary);">₱ 0.00</div>
            </div>
        </div>

        <div class="dashboard-grid fade-up visible">
            <!-- Apply form -->
            <div class="panel glass">
                <h2 style="margin-bottom: 1rem;"><i class="fas fa-plus-circle title-gradient"></i> Apply</h2>
                <form id="transactForm">
                    <div style="margin-bottom: 1rem;">
                        <select id="serviceType" required>
                            <option value="" disabled selected>Select Category</option>
                            <option value="savings">Savings Deposit</option>
                            <option value="loans">Apply for Loan</option>
                            <option value="benefits">Enroll Benefit</option>
                        </select>
                    </div>

                    <div style="margin-bottom: 1rem;">
                        <select id="serviceProduct" required>
                            <option value="">-- Select Product --</option>
                        </select>
                    </div>

                    <div style="margin-bottom: 1.5rem;">
                        <input type="text" id="amountInput" inputmode="numeric" placeholder="Amount (PHP)" required>
                    </div>

                    <!-- Loan Calculator -->
                    <div id="loan-calculator-section" style="display: none; background: rgba(0,0,0,0.02); padding: 1rem; border-radius: var(--radius-sm); margin-bottom: 1.5rem;">
                        <h4 style="margin-bottom:0.5rem;">Loan Simulator</h4>
                        <div style="display: flex; gap: 1rem; margin-bottom: 1rem; align-items: center;">
                            <select id="loanTerm" style="flex: 1; padding: 0.8rem;">
                                <option value="3">3 Months</option>
                                <option value="6">6 Months</option>
                                <option value="9">9 Months</option>
                                <option value="12">12 Months</option>
                            </select>
                            <span style="font-size: 0.8rem; color: var(--text-muted); flex: 1;">* 1.5% Monthly Interest</span>
                        </div>
                        <div id="monthly-amortization" style="background: white; padding: 1rem; border-radius: var(--radius-sm); border: 1px solid rgba(0,0,0,0.05);">
                            Estimated Monthly Payment: ₱ 0.00
                        </div>

                        <div style="margin-top: 1rem;">
                            <label style="font-weight: 500; font-size: 0.9rem; display: block; margin-bottom: 0.5rem;"><i class="fas fa-id-card"></i> Proof of Income (PDF)</label>
                            <input type="file" id="proofFile" accept=".pdf" style="padding: 0.8rem;">
                        </div>
                    </div>

                    <label style="display: flex; gap: 0.5rem; align-items: start; font-size: 0.85rem; margin-bottom: 1.5rem; cursor: pointer;">
                        <input type="checkbox" id="agreeTerms" required style="margin-top: 0.2rem;">
                        <span>I certify the info is true. I agree to the <a href="#" onclick="showAgreementModal(); return false;" style="color: var(--primary);">Terms & Conditions</a>.</span>
                    </label>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">Submit Request</button>
                </form>
            </div>

            <!-- History -->
            <div class="panel glass">
                <h2 style="margin-bottom: 1.5rem;">Transaction History</h2>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Product</th>
                                <th>Details</th>
                                <th>Amount</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="member-trans-body">
                            <tr><td colspan="5">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script src="js/main.js"></script>
    <script src="js/coop-logic.js"></script>
</body>
</html>
