<!DOCTYPE html>
<html lang=en>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width, initial-scale=1.0">
<title>Login | Baao Coop Portal</title>
<link rel=stylesheet href=css/styles.css>
<style>body{background-color:var(--bg-color);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;opacity:1;transition:opacity .3s ease}.login-container{background:var(--bg-alt);width:100%;max-width:450px;padding:3rem;text-align:center;position:relative;z-index:10;border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);border:var(--glass-border)}.login-logo{margin-bottom:2rem;display:flex;flex-direction:column;align-items:center;gap:1rem}.form-group{margin-bottom:1.5rem;text-align:left}.form-group label{display:block;margin-bottom:.5rem;font-weight:600;color:var(--text-muted);font-size:.9rem}.form-group input{width:100%;padding:.8rem 1rem;border:1px solid rgba(0,0,0,0.1);border-radius:var(--radius-sm);font-family:inherit;font-size:1rem;background:var(--bg-color);color:var(--text-main)}.login-options{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;font-size:.9rem}.forgot-password{color:var(--secondary);font-weight:500;text-decoration:none}.forgot-password:hover{text-decoration:underline}.signup-prompt{margin-top:2rem;font-size:.95rem;color:var(--text-muted)}.signup-prompt a{color:var(--secondary);font-weight:600}.back-home{position:absolute;top:2rem;left:2rem;color:var(--text-main);display:flex;align-items:center;gap:.5rem;font-weight:600;text-decoration:none}.back-home:hover{color:var(--primary)}h2.title-gradient{color:var(--text-main);font-size:1.5rem;margin:0}</style>
<link rel=icon href=assets/images/logo.png type=image/png>
</head>
<body>
<a href=index.html class=back-home id=backHomeBtn>
← Back to Home
</a>
<div class="login-container glass fade-up visible">
<div class=login-logo>
<img src=assets/images/logo.png alt="Baao Coop Logo" style=height:60px;width:60px;border-radius:var(--radius-md);object-fit:cover>
<h2 class=title-gradient>Member Portal</h2>
</div>
<form id=loginForm>
<div class=form-group>
<label for=emailInput>Member Email</label>
<input type=text id=emailInput placeholder="Enter your email" required>
</div>
<div class=form-group>
<label for=passwordInput>Password</label>
<input type=password id=passwordInput placeholder="Enter your password" required>
</div>
<div class=login-options>
<label style=display:flex;align-items:center;gap:.5rem;cursor:pointer;color:var(--text-main);font-weight:500>
<input type=checkbox> Remember me
</label>
</div>
<button type=submit class="btn btn-primary" style=width:100%;padding:1rem;font-size:1.1rem>
Sign In
</button>
</form>
<div class=signup-prompt>
Not a member yet?<a href=membership.html style=margin-left:10px> Create an Account</a>
</div>
</div>
<script type="module">
import{auth}from'./js/config.js';import{signInWithEmailAndPassword}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";const lastHash=localStorage.getItem('baaocoop_last_hash')||'#home';document.getElementById('backHomeBtn').href='index.html'+lastHash;document.body.style.opacity='0';requestAnimationFrame(()=>requestAnimationFrame(()=>document.body.style.opacity='1'));document.getElementById('loginForm').addEventListener('submit',async(e)=>{e.preventDefault();const email=document.getElementById('emailInput').value;const pass=document.getElementById('passwordInput').value;const btn=e.target.querySelector('button');try{btn.textContent='Signing in...';btn.disabled=true;const userCred=await signInWithEmailAndPassword(auth,email,pass);localStorage.setItem('baaocoop_user',JSON.stringify({email:userCred.user.email,name:email.split('@')[0]}));window.location.href='members.html';}catch(err){alert("Invalid credentials or user not found.");btn.textContent='Sign In';btn.disabled=false;}});
</script>
</body>
</html>
