<!DOCTYPE html>
<html lang=en>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width, initial-scale=1.0">
<title>Sign Up - Baao Coop</title>
<link rel=icon href=assets/logo.png type=image/png>
<link rel=stylesheet href=style.css>
<link rel=stylesheet href=https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css>
<style>body{background:#e3f2fd;display:flex;align-items:center;justify-content:center;height:100vh}.login-card{background:white;padding:40px;width:100%;max-width:400px;border-radius:10px;box-shadow:0 10px 25px rgba(0,0,0,0.1);text-align:center;border-top:5px solid var(--secondary)}.login-card img{height:80px;margin-bottom:20px}.form-group{margin-bottom:15px;text-align:left}.login-input{width:100%;padding:12px;border:1px solid #ccc;border-radius:5px}.btn-login{width:100%;padding:12px;background:var(--secondary);color:white;border:0;cursor:pointer;border-radius:5px;font-weight:bold;transition:.3s}.btn-login:hover{background:#b30000}.login-card a{text-decoration:none;transition:.3s}.login-card a:hover{text-decoration:underline}</style>
</head>
<body>
<div class=login-card>
<img src=assets/logo.png alt="Baao Coop Logo">
<h2 style=color:var(--primary);margin-bottom:10px>Create Account</h2>
<p style=margin-bottom:20px;color:#666>Join Baao Coop Online</p>
<form id=signupForm>
<div class=form-group>
<label>Full Name</label>
<input type=text id=newName class=login-input placeholder="Juan Dela Cruz" required>
</div>
<div class=form-group>
<label>Email Address</label>
<input type=email id=newEmail class=login-input placeholder=juan@example.com required>
</div>
<div class=form-group>
<label>Password</label>
<input type=password id=newPassword class=login-input placeholder="Create a password" required>
</div>
<button type=submit class=btn-login>REGISTER</button>
</form>
<p style=margin-top:20px;font-size:.9rem>
Already a member? <a href=login.html style=color:var(--primary);font-weight:bold>Log In here</a>
</p>
<div style="margin-top:15px;border-top:1px solid #eee;padding-top:15px">
<a href=index.html style=color:#666;font-size:.9rem><i class="fas fa-arrow-left"></i> Back to Website</a>
</div>
</div>
<script src=script.js></script>
</body>
</html>
